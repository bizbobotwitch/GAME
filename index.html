<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV GAMES - Downloads</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-size: 3.8rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -2px;
        }
        .subtitle {
            font-size: 1.5rem;
            color: #aaaaaa;
            margin-top: 8px;
        }
        .github-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: #222;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .github-link:hover {
            background: #00ff88;
            color: #000;
            transform: translateY(-3px);
        }
        .release-card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.1rem;
        }
        .error {
            color: #ff5555;
            text-align: center;
            padding: 20px;
        }
        .download-grid {
            display: grid;
            gap: 16px;
        }
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,136,0.3);
            color: #fff;
            padding: 20px 24px;
            border-radius: 14px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .download-btn:hover {
            background: #00ff88;
            color: #000;
            transform: translateX(12px);
            box-shadow: 0 15px 25px rgba(0,255,136,0.25);
        }
        .filename {
            font-family: monospace;
            font-size: 1.1rem;
            word-break: break-all;
        }
        .size {
            color: #888;
            font-size: 0.95rem;
        }
        footer {
            text-align: center;
            margin-top: 70px;
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KV GAMES</h1>
            <p class="subtitle">List of Games — Live from GitHub</p>
            <a href="https://github.com/bizbobotwitch/GAME" target="_blank" class="github-link">
                View Repository on GitHub
            </a>
        </header>

        <div class="release-card">
            <div id="status" class="loading">Loading latest games from GitHub...</div>
            <div id="download-list" class="download-grid"></div>
        </div>

        <footer>
            Powered by GitHub Releases • 
            <a href="https://github.com/bizbobotwitch/GAME/releases/tag/Games" 
               target="_blank" style="color:#00ff88;">Open Release Page</a>
        </footer>
    </div>

    <script>
        const owner = "bizbobotwitch";
        const repo = "GAME";
        const tag = "Games";

        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('download-list');

        async function fetchGames() {
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const release = await response.json();

                statusEl.style.display = 'none';

                if (!release.assets || release.assets.length === 0) {
                    listEl.innerHTML = `<p style="text-align:center; color:#888; padding:30px;">No game files found in this release yet.</p>`;
                    return;
                }

                const assets = release.assets.sort((a, b) => a.name.localeCompare(b.name));

                listEl.innerHTML = '';

                assets.forEach(asset => {
                    const btn = document.createElement('a');
                    btn.href = asset.browser_download_url;
                    btn.className = 'download-btn';
                    btn.target = '_blank';
                    
                    const sizeMB = (asset.size / (1024 * 1024)).toFixed(2);
                    
                    btn.innerHTML = `
                        <div>
                            <div class="filename">${asset.name}</div>
                            <div class="size">${sizeMB} MB • ${asset.download_count} downloads</div>
                        </div>
                        <span style="font-size: 2rem; opacity: 0.9;">↓</span>
                    `;
                    
                    listEl.appendChild(btn);
                });

            } catch (error) {
                console.error(error);
                statusEl.className = 'error';
                statusEl.innerHTML = `Failed to load games.<br>Please try again later or visit the GitHub release directly.`;
            }
        }

        window.onload = fetchGames;
    </script>
</body>
</html>
