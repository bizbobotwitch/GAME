<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keith Valley Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        header { 
            text-align: center; 
            margin-bottom: 40px; 
        }
        h1 {
            font-size: 3.6rem;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
        }
        .subtitle {
            font-size: 1.4rem;
            color: #aaaaaa;
            margin-top: 8px;
        }

        .search-container {
            margin-bottom: 25px;
            text-align: center;
        }
        #searchInput {
            width: 60%;
            max-width: 500px;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.05rem;
        }
        #searchInput::placeholder { color: #888; }

        .main-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .downloads-section { flex: 1; min-width: 300px; }
        .sidebar { width: 320px; min-width: 280px; }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .tab {
            padding: 14px 32px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            color: #aaa;
        }
        .tab.active {
            color: #00ff88;
            border-bottom: 4px solid #00ff88;
        }

        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .download-item, .web-game-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 16px 22px;
            margin-bottom: 14px;
            transition: all 0.3s;
        }
        .download-item:hover, .web-game-item:hover {
            background: #00ff88;
            color: #000;
            transform: translateX(8px);
        }

        .thumbnail {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .no-thumb {
            width: 90px;
            height: 90px;
            background: #222;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            flex-shrink: 0;
        }

        .info { flex: 1; }
        .filename, .web-title { 
            font-size: 1.12rem; 
            font-weight: 500; 
            margin-bottom: 4px; 
            font-family: monospace; 
        }
        .size { color: #888; font-size: 0.9rem; }

        .sidebar-card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0,255,136,0.2);
        }
        .try-title {
            color: #00ff88;
            font-size: 1.35rem;
            margin-bottom: 15px;
        }
        .random-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .random-game .no-thumb {
            width: 130px;
            height: 130px;
            font-size: 3.5rem;
            margin-bottom: 12px;
        }
        .play-btn {
            background: #00ff88;
            color: #000;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 10px;
        }

        .contact {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .contact a {
            color: #00ff88;
            text-decoration: none;
        }
        .contact a:hover {
            text-decoration: underline;
        }

        footer { 
            text-align: center; 
            margin-top: 40px; 
            color: #666; 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Keith Valley Games</h1>
            <p class="subtitle">Play • Download • Enjoy</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search games..." onkeyup="filterGames()">
        </div>

        <div class="main-content">
            <div class="downloads-section">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab(0)">⬇️ Downloadable Games</div>
                    <div class="tab" onclick="switchTab(1)">🌐 Web Games</div>
                </div>

                <!-- Downloadable Games -->
                <div id="download-section" class="card">
                    <div id="status" class="loading" style="text-align:center; padding:40px; color:#888;">Loading games...</div>
                    <div id="download-list"></div>
                </div>

                <!-- Web Games -->
                <div id="web-section" class="card" style="display: none;">
                    <div id="web-games-list"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-card">
                    <div class="try-title">🎲 Try This Game?</div>
                    <div id="random-game" class="random-game"></div>
                </div>
            </div>
        </div>

        <!-- Contact Us -->
        <div class="contact">
            <h2 style="margin: 0 0 15px 0; color: #00ff88;">Contact Us</h2>
            <p style="margin: 0 0 10px 0;">Have questions, feedback, or want to report a bug?</p>
            <p style="margin: 0;">
                Email us at: 
                <a href="mailto:Bizbobotwitch1@gmail.com">Bizbobotwitch1@gmail.com</a>
            </p>
        </div>

        <footer>
            Made with ❤️ for the Keith Valley community
        </footer>
    </div>

    <script>
        let allGames = [];
        let downloadableGames = [];

        const webGames = [
            { title: "Piggy Escape", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/block-the-pig/index.html", description: "Block the pig from escaping!", type: "web", thumb: "🐷" },
            { title: "Core Ball", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/core-ball/index.html", description: "Fun ball bouncing challenge", type: "web", thumb: "⚽" },
            { title: "CircleoO", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/circlo/index.html", description: "Addictive circle puzzle game", type: "web", thumb: "⭕" },
            { title: "BitLife", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/bitlife/index.html", description: "Life simulation game", type: "web", thumb: "🧬" },
            { title: "Slope", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/slope/index.html", description: "High-speed endless runner", type: "web", thumb: "🏂" }
        ];

        function renderWebGames() {
            const container = document.getElementById('web-games-list');
            container.innerHTML = '<h2 style="margin-top:0; color:#00ff88;">🌐 Web Games (Play Instantly)</h2>';

            webGames.forEach(game => {
                const item = document.createElement('div');
                item.className = 'web-game-item';
                item.innerHTML = `
                    <div class="no-thumb">${game.thumb}</div>
                    <div class="info">
                        <div class="web-title">${game.title}</div>
                        <div class="size">${game.description}</div>
                    </div>
                    <a href="${game.url}" target="_blank" class="play-btn">Play Now</a>
                `;
                container.appendChild(item);
            });
        }

        async function fetchGames() {
            const status = document.getElementById('status');
            const list = document.getElementById('download-list');

            try {
                const res = await fetch(`https://api.github.com/repos/bizbobotwitch/GAME/releases/tags/Games`);
                if (!res.ok) throw new Error();

                const release = await res.json();
                status.style.display = 'none';

                const images = {};
                downloadableGames = [];

                // Load existing games from release
                release.assets.forEach(asset => {
                    const lower = asset.name.toLowerCase();
                    if (lower.endsWith('.png') || lower.endsWith('.jpg') || lower.endsWith('.jpeg')) {
                        const base = asset.name.replace(/\.(png|jpg|jpeg)$/i, '').toLowerCase();
                        images[base] = asset.browser_download_url;
                    } else {
                        const displayName = asset.name.split('/').pop();
                        downloadableGames.push({
                            title: displayName,
                            url: asset.browser_download_url,
                            description: (asset.size / (1024*1024)).toFixed(1) + " MB",
                            type: "download",
                            thumbUrl: null
                        });
                    }
                });

                // Add Kerbal Space Program and Deltarune with direct links
                downloadableGames.unshift(
                    {
                        title: "Kerbal Space Program",
                        url: "https://steamrip.com/wp-content/uploads/2023/06/Kerbal.Space.Program.zip",   // Direct zip link
                        description: "Space flight simulation",
                        type: "download",
                        thumbUrl: null
                    },
                    {
                        title: "Deltarune Chapters 1+2",
                        url: "https://itch.io/games/download/1671210",   // Official itch.io direct download
                        description: "Undertale sequel (Chapters 1 & 2)",
                        type: "download",
                        thumbUrl: null
                    }
                );

                downloadableGames.forEach(game => {
                    const base = game.title.toLowerCase().replace(/\.(zip|rar|7z|tar\.gz|exe)$/i, '');
                    if (images[base]) game.thumbUrl = images[base];
                });

                allGames = [...webGames, ...downloadableGames];

                renderDownloadableGames();
            } catch (e) {
                status.innerHTML = `Failed to load games. Please try again later.`;
            }
        }

        function renderDownloadableGames(filtered = null) {
            const list = document.getElementById('download-list');
            list.innerHTML = '';

            const gamesToShow = filtered || downloadableGames;

            if (gamesToShow.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#888;">No games found.</p>`;
                return;
            }

            gamesToShow.forEach(game => {
                const item = document.createElement('div');
                item.className = 'download-item';
                item.style.position = 'relative';

                const isZadmin = game.title.toLowerCase().includes('zadmin.bat');

                const thumbHTML = game.thumbUrl 
                    ? `<img src="${game.thumbUrl}" class="thumbnail" alt="Preview">` 
                    : `<div class="no-thumb">🎮</div>`;

                let downloadHTML = '';
                if (isZadmin) {
                    downloadHTML = `<button onclick="checkPassword('${game.url}')" 
                        style="background:#ff5555; color:white; padding:12px 24px; border-radius:50px; border:none; font-weight:600; cursor:pointer;">
                        Download (Password Required)
                    </button>`;
                } else {
                    downloadHTML = `<a href="${game.url}" target="_blank" 
                        style="background:#00ff88; color:#000; padding:12px 24px; border-radius:50px; text-decoration:none; font-weight:600;">
                        Download
                    </a>`;
                }

                item.innerHTML = `
                    ${thumbHTML}
                    <div class="info">
                        <div class="filename">${game.title}</div>
                        <div class="size">${game.description}</div>
                    </div>
                    ${downloadHTML}
                `;
                list.appendChild(item);
            });
        }

        function checkPassword(url) {
            const password = prompt("Enter password to download:");
            if (password === "112111") {
                window.open(url, '_blank');
            } else {
                alert("Incorrect password!");
            }
        }

        function filterGames() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (query === "") {
                renderDownloadableGames();
                return;
            }
            const filtered = downloadableGames.filter(game => 
                game.title.toLowerCase().includes(query)
            );
            renderDownloadableGames(filtered);
        }

        function showRandomGame() {
            const container = document.getElementById('random-game');
            const safeGames = allGames.filter(game => 
                !game.title.toLowerCase().includes('zadmin.bat')
            );

            if (safeGames.length === 0) return;

            const randomGame = safeGames[Math.floor(Math.random() * safeGames.length)];

            const thumbHTML = randomGame.thumbUrl 
                ? `<img src="${randomGame.thumbUrl}" class="thumbnail" style="width:130px;height:130px;">` 
                : `<div class="no-thumb">${randomGame.thumb || (randomGame.type === "web" ? "🌐" : "🎮")}</div>`;

            container.innerHTML = `
                ${thumbHTML}
                <div style="font-size:1.3rem; font-weight:600; margin:12px 0;">${randomGame.title}</div>
                <div style="color:#aaa; margin-bottom:15px;">${randomGame.description}</div>
                <a href="${randomGame.url}" target="_blank" class="play-btn">
                    ${randomGame.type === "web" ? "Play Now" : "Download"}
                </a>
            `;
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
            document.getElementById('download-section').style.display = (n === 0) ? 'block' : 'none';
            document.getElementById('web-section').style.display = (n === 1) ? 'block' : 'none';
        }

        window.onload = () => {
            fetchGames();
            renderWebGames();
            setTimeout(showRandomGame, 1200);
        };
    </script>
</body>
</html>
