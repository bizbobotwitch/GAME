<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV GAMES - Downloads</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-size: 3.8rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -2px;
        }
        .subtitle {
            font-size: 1.5rem;
            color: #aaaaaa;
            margin-top: 8px;
        }
        .section-title {
            font-size: 1.8rem;
            margin: 40px 0 20px 0;
            color: #00ff88;
            border-bottom: 2px solid rgba(0,255,136,0.3);
            padding-bottom: 10px;
        }
        .github-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: #222;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .github-link:hover {
            background: #00ff88;
            color: #000;
            transform: translateY(-3px);
        }
        .release-card, .web-card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            margin-bottom: 30px;
        }
        .loading { text-align: center; padding: 50px; color: #888; font-size: 1.1rem; }
        .error { color: #ff5555; text-align: center; padding: 30px; }

        .download-item, .web-game-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 18px 24px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        .download-item:hover, .web-game-item:hover {
            background: #00ff88;
            color: #000;
            transform: translateX(10px);
        }
        .thumbnail {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .no-thumb {
            width: 90px;
            height: 90px;
            background: #222;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #555;
            flex-shrink: 0;
        }
        .info {
            flex: 1;
        }
        .filename, .web-title {
            font-family: monospace;
            font-size: 1.15rem;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .size {
            color: #888;
            font-size: 0.95rem;
        }
        .play-btn {
            background: #00ff88;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            white-space: nowrap;
        }
        .new-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff00aa;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        footer {
            text-align: center;
            margin-top: 80px;
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KV GAMES</h1>
            <p class="subtitle">Play & Download — Live from GitHub</p>
            <a href="https://github.com/bizbobotwitch/GAME" target="_blank" class="github-link">
                View Repository on GitHub
            </a>
        </header>

        <!-- === WEB GAMES SECTION === -->
        <h2 class="section-title">🌐 Web Games (Play in Browser)</h2>
        <div class="web-card">
            <div id="web-games-list"></div>
        </div>

        <!-- === DOWNLOADABLE GAMES SECTION === -->
        <h2 class="section-title">⬇️ Downloadable Games</h2>
        <div class="release-card">
            <div id="status" class="loading">Loading latest games from GitHub...</div>
            <div id="download-list"></div>
        </div>

        <footer>
            Powered by GitHub Releases • 
            <a href="https://github.com/bizbobotwitch/GAME/releases/tag/Games" 
               target="_blank" style="color:#00ff88;">Open Release Page</a>
        </footer>
    </div>

    <script>
        // ==================== WEB GAMES (Add your browser games here) ====================
        const webGames = [
            {
                title: "Example Snake Game",
                url: "https://your-username.github.io/snake-game",   // Change this to your actual web game URL
                thumb: "https://via.placeholder.com/90x90/00ff88/000000?text=Snake", // optional thumbnail
                description: "Classic snake game"
            },
            // Add more web games here like this:
            // {
            //     title: "Flappy Bird Clone",
            //     url: "https://bizbobotwitch.github.io/flappy",
            //     thumb: "", 
            //     description: "Flappy bird style game"
            // }
        ];

        function renderWebGames() {
            const container = document.getElementById('web-games-list');
            container.innerHTML = '';

            if (webGames.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#888;">No web games added yet.</p>`;
                return;
            }

            webGames.forEach(game => {
                const item = document.createElement('div');
                item.className = 'web-game-item';

                const thumbHTML = game.thumb 
                    ? `<img src="${game.thumb}" class="thumbnail" alt="Preview">`
                    : `<div class="no-thumb">🌐</div>`;

                item.innerHTML = `
                    ${thumbHTML}
                    <div class="info">
                        <div class="web-title">${game.title}</div>
                        <div class="size">${game.description}</div>
                    </div>
                    <a href="${game.url}" target="_blank" class="play-btn">Play Now</a>
                `;
                container.appendChild(item);
            });
        }

        // ==================== DOWNLOADABLE GAMES FROM GITHUB ====================
        const owner = "bizbobotwitch";
        const repo = "GAME";
        const tag = "Games";

        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('download-list');

        function isNew(dateStr) {
            const uploaded = new Date(dateStr);
            const now = new Date();
            const diffDays = (now - uploaded) / (1000 * 60 * 60 * 24);
            return diffDays < 7;
        }

        async function fetchGames() {
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}`);
                if (!response.ok) throw new Error('Release not found');

                const release = await response.json();
                statusEl.style.display = 'none';

                if (!release.assets || release.assets.length === 0) {
                    listEl.innerHTML = `<p style="text-align:center; color:#888; padding:40px;">No downloadable games found yet.</p>`;
                    return;
                }

                const images = {};
                const games = [];

                release.assets.forEach(asset => {
                    const lowerName = asset.name.toLowerCase();
                    if (lowerName.endsWith('.png') || lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg')) {
                        const baseName = asset.name.replace(/\.(png|jpg|jpeg)$/i, '').toLowerCase();
                        images[baseName] = asset.browser_download_url;
                    } else {
                        games.push(asset);
                    }
                });

                games.sort((a, b) => a.name.localeCompare(b.name));

                listEl.innerHTML = '';

                games.forEach(asset => {
                    const item = document.createElement('div');
                    item.className = 'download-item';

                    const lowerBase = asset.name.replace(/\.(zip|rar|7z|tar\.gz|exe)$/i, '').toLowerCase();
                    const thumbUrl = images[lowerBase] || null;

                    const sizeMB = (asset.size / (1024 * 1024)).toFixed(2);
                    const isNewGame = isNew(asset.updated_at || asset.created_at);

                    let html = thumbUrl 
                        ? `<img src="${thumbUrl}" class="thumbnail" alt="Preview">` 
                        : `<div class="no-thumb">🎮</div>`;

                    html += `
                        <div class="info">
                            <div class="filename">${asset.name}</div>
                            <div class="size">${sizeMB} MB • ${asset.download_count} downloads</div>
                        </div>
                        <a href="${asset.browser_download_url}" target="_blank"
                           style="background:#00ff88; color:#000; padding:12px 24px; border-radius:50px; text-decoration:none; font-weight:600;">
                            Download
                        </a>
                    `;

                    item.innerHTML = html;

                    if (isNewGame) {
                        const badge = document.createElement('div');
                        badge.className = 'new-badge';
                        badge.textContent = 'NEW!';
                        item.appendChild(badge);
                    }

                    listEl.appendChild(item);
                });

            } catch (err) {
                statusEl.className = 'error';
                statusEl.innerHTML = `Could not load games.<br>Make sure the release tag "Games" exists.`;
            }
        }

        // Initialize both sections
        window.onload = () => {
            renderWebGames();
            fetchGames();
        };
    </script>
</body>
</html>
