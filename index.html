<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV GAMES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        header { 
            text-align: center; 
            margin-bottom: 40px; 
        }
        h1 {
            font-size: 3.8rem;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -2px;
        }
        .github-link {
            display: inline-block;
            margin: 15px 0;
            padding: 12px 28px;
            background: #222;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
        .github-link:hover { background: #00ff88; color: #000; }

        .main-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .downloads-section {
            flex: 1;
            min-width: 300px;
        }
        .sidebar {
            width: 320px;
            min-width: 280px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .tab {
            padding: 14px 30px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            color: #aaa;
        }
        .tab.active {
            color: #00ff88;
            border-bottom: 4px solid #00ff88;
        }

        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .folder-title {
            font-size: 1.4rem;
            color: #00b4ff;
            margin: 25px 0 12px 0;
        }
        .download-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 16px 22px;
            margin-bottom: 14px;
            transition: all 0.3s;
        }
        .download-item:hover {
            background: #00ff88;
            color: #000;
            transform: translateX(8px);
        }
        .thumbnail, .no-thumb {
            width: 80px; height: 80px; border-radius: 10px; flex-shrink: 0;
        }
        .no-thumb {
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .info { flex: 1; }
        .filename { font-size: 1.1rem; font-weight: 500; margin-bottom: 4px; font-family: monospace; }
        .size { color: #888; font-size: 0.9rem; }

        .sidebar-card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0,255,136,0.2);
        }
        .try-title {
            color: #00ff88;
            font-size: 1.35rem;
            margin-bottom: 15px;
        }
        .random-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .random-game .no-thumb {
            width: 140px;
            height: 140px;
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .play-btn {
            background: #00ff88;
            color: #000;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 10px;
        }

        .new-badge {
            position: absolute; top: -8px; right: -8px;
            background: #ff00aa; color: white; font-size: 0.75rem; font-weight: 700;
            padding: 3px 11px; border-radius: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

        footer { 
            text-align: center; 
            margin-top: 80px; 
            color: #666; 
            font-size: 0.95rem; 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KV GAMES</h1>
            <a href="https://github.com/bizbobotwitch/GAME" target="_blank" class="github-link">
                View on GitHub
            </a>
        </header>

        <div class="main-content">
            <!-- Main Downloads Section -->
            <div class="downloads-section">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab(0)">⬇️ Downloadable Games</div>
                    <div class="tab" onclick="switchTab(1)">🌐 Web Games</div>
                </div>

                <div id="download-section" class="card">
                    <div id="status" class="loading" style="text-align:center; padding:40px; color:#888;">Loading games from GitHub...</div>
                    <div id="download-list"></div>
                </div>
            </div>

            <!-- Sidebar: Try This Game -->
            <div class="sidebar">
                <div class="sidebar-card">
                    <div class="try-title">🎲 Try This Game?</div>
                    <div id="random-game" class="random-game"></div>
                </div>
            </div>
        </div>

        <footer>
            Powered by GitHub Releases • 
            <a href="https://github.com/bizbobotwitch/GAME/releases/tag/Games" target="_blank" style="color:#00ff88;">Open Release Page</a>
        </footer>
    </div>

    <script>
        // Web Games (Only Piggy Escape for now)
        const webGames = [
            { 
                title: "Piggy Escape", 
                url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/block-the-pig/index.html", 
                description: "Classic logic puzzle - Block the pig from escaping!" 
            }
        ];

        // Show random game in sidebar (currently only one, but works for multiple)
        function showRandomGame() {
            const container = document.getElementById('random-game');
            const game = webGames[Math.floor(Math.random() * webGames.length)];

            container.innerHTML = `
                <div class="no-thumb">🐷</div>
                <div style="font-size:1.3rem; font-weight:600; margin-bottom:8px;">${game.title}</div>
                <div style="color:#aaa; margin-bottom:15px;">${game.description}</div>
                <a href="${game.url}" target="_blank" class="play-btn">Play Now</a>
            `;
        }

        // Downloadable Games with folder support
        const owner = "bizbobotwitch";
        const repo = "GAME";
        const tag = "Games";

        function isNew(dateStr) {
            const diffDays = (Date.now() - new Date(dateStr)) / (1000 * 60 * 60 * 24);
            return diffDays < 7;
        }

        async function fetchGames() {
            const status = document.getElementById('status');
            const list = document.getElementById('download-list');

            try {
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}`);
                if (!res.ok) throw new Error();

                const release = await res.json();
                status.style.display = 'none';

                if (!release.assets || release.assets.length === 0) {
                    list.innerHTML = `<p style="text-align:center; color:#888;">No downloadable games found yet.</p>`;
                    return;
                }

                const images = {};
                const games = [];

                release.assets.forEach(asset => {
                    const lower = asset.name.toLowerCase();
                    if (lower.endsWith('.png') || lower.endsWith('.jpg') || lower.endsWith('.jpeg')) {
                        const base = asset.name.replace(/\.(png|jpg|jpeg)$/i, '').toLowerCase();
                        images[base] = asset.browser_download_url;
                    } else {
                        games.push(asset);
                    }
                });

                const grouped = {};
                games.forEach(asset => {
                    const parts = asset.name.split('/');
                    const folder = parts.length > 1 ? parts[0] : "Other Games";
                    const fileName = parts[parts.length - 1];

                    if (!grouped[folder]) grouped[folder] = [];
                    grouped[folder].push({ ...asset, displayName: fileName });
                });

                list.innerHTML = '';

                Object.keys(grouped).sort().forEach(folder => {
                    const folderDiv = document.createElement('div');
                    folderDiv.innerHTML = `<div class="folder-title">📁 ${folder}</div>`;
                    list.appendChild(folderDiv);

                    grouped[folder].sort((a,b) => a.displayName.localeCompare(b.displayName));

                    grouped[folder].forEach(asset => {
                        const item = document.createElement('div');
                        item.className = 'download-item';
                        item.style.position = 'relative';

                        const base = asset.displayName.replace(/\.(zip|rar|7z|tar\.gz|exe)$/i, '').toLowerCase();
                        const thumb = images[base] || null;

                        const sizeMB = (asset.size / 1024 / 1024).toFixed(2);
                        const newBadge = isNew(asset.updated_at) ? `<div class="new-badge">NEW!</div>` : '';

                        let html = thumb 
                            ? `<img src="${thumb}" class="thumbnail">` 
                            : `<div class="no-thumb">🎮</div>`;

                        html += `
                            <div class="info">
                                <div class="filename">${asset.displayName}</div>
                                <div class="size">${sizeMB} MB • ${asset.download_count} downloads</div>
                            </div>
                            <a href="${asset.browser_download_url}" target="_blank" class="download-btn" 
                               style="background:#00ff88; color:#000; padding:12px 24px; border-radius:50px; text-decoration:none; font-weight:600;">
                                Download
                            </a>
                        `;

                        item.innerHTML = html + newBadge;
                        list.appendChild(item);
                    });
                });

            } catch (e) {
                status.innerHTML = `Failed to load games.<br>Make sure the release tag "Games" exists.`;
            }
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
            // For now we only have one main section, but kept the function for future
        }

        // Initialize - Start with Downloads + Random Game
        window.onload = () => {
            fetchGames();
            showRandomGame();
        };
    </script>
</body>
</html>
