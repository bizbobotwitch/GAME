<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV GAMES - Downloads</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-size: 3.8rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -2px;
        }
        .subtitle {
            font-size: 1.5rem;
            color: #aaaaaa;
            margin-top: 8px;
        }
        .github-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: #222;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .github-link:hover {
            background: #00ff88;
            color: #000;
            transform: translateY(-3px);
        }
        .release-card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
        }
        .loading { text-align: center; padding: 50px; color: #888; font-size: 1.1rem; }
        .error { color: #ff5555; text-align: center; padding: 30px; }

        .download-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 18px 24px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        .download-item:hover {
            background: #00ff88;
            color: #000;
            transform: translateX(10px);
            box-shadow: 0 15px 30px rgba(0,255,136,0.25);
        }
        .thumbnail {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .no-thumb {
            width: 90px;
            height: 90px;
            background: #222;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #555;
            flex-shrink: 0;
        }
        .info {
            flex: 1;
        }
        .filename {
            font-family: monospace;
            font-size: 1.15rem;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .size {
            color: #888;
            font-size: 0.95rem;
        }
        .new-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff00aa;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(255,0,170,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .relative { position: relative; }
        footer {
            text-align: center;
            margin-top: 80px;
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KV GAMES</h1>
            <p class="subtitle">List of Games — Live from GitHub</p>
            <a href="https://github.com/bizbobotwitch/GAME" target="_blank" class="github-link">
                View Repository on GitHub
            </a>
        </header>

        <div class="release-card">
            <div id="status" class="loading">Loading latest games from GitHub...</div>
            <div id="download-list"></div>
        </div>

        <footer>
            Powered by GitHub Releases • 
            <a href="https://github.com/bizbobotwitch/GAME/releases/tag/Games" 
               target="_blank" style="color:#00ff88;">Open Release Page</a>
        </footer>
    </div>

    <script>
        const owner = "bizbobotwitch";
        const repo = "GAME";
        const tag = "Games";

        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('download-list');

        function isNew(dateStr) {
            const uploaded = new Date(dateStr);
            const now = new Date();
            const diffDays = (now - uploaded) / (1000 * 60 * 60 * 24);
            return diffDays < 7;   // "NEW!" if uploaded in last 7 days
        }

        async function fetchGames() {
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}`);
                if (!response.ok) throw new Error('Release not found');

                const release = await response.json();
                statusEl.style.display = 'none';

                if (!release.assets || release.assets.length === 0) {
                    listEl.innerHTML = `<p style="text-align:center; color:#888; padding:40px;">No game files found yet.</p>`;
                    return;
                }

                // Separate PNG images and other files
                const images = {};
                const games = [];

                release.assets.forEach(asset => {
                    const lowerName = asset.name.toLowerCase();
                    if (lowerName.endsWith('.png')) {
                        // Try to match image to game name (remove extension and compare)
                        const baseName = asset.name.replace(/\.(png|jpg|jpeg)$/i, '').toLowerCase();
                        images[baseName] = asset.browser_download_url;
                    } else {
                        games.push(asset);
                    }
                });

                // Sort games by name
                games.sort((a, b) => a.name.localeCompare(b.name));

                listEl.innerHTML = '';

                games.forEach(asset => {
                    const item = document.createElement('div');
                    item.className = 'download-item relative';

                    const lowerBase = asset.name.replace(/\.(zip|rar|7z|tar\.gz|exe)$/i, '').toLowerCase();
                    const thumbUrl = images[lowerBase] || null;

                    const sizeMB = (asset.size / (1024 * 1024)).toFixed(2);
                    const isNewGame = isNew(asset.updated_at || asset.created_at);

                    let html = '';

                    if (thumbUrl) {
                        html += `<img src="${thumbUrl}" class="thumbnail" alt="Preview">`;
                    } else {
                        html += `<div class="no-thumb">🎮</div>`;
                    }

                    html += `
                        <div class="info">
                            <div class="filename">${asset.name}</div>
                            <div class="size">${sizeMB} MB • ${asset.download_count} downloads</div>
                        </div>
                        <a href="${asset.browser_download_url}" target="_blank" 
                           style="background:#00ff88; color:#000; padding:12px 24px; border-radius:50px; text-decoration:none; font-weight:600;">
                            Download
                        </a>
                    `;

                    item.innerHTML = html;

                    // Add NEW! badge if recently added
                    if (isNewGame) {
                        const badge = document.createElement('div');
                        badge.className = 'new-badge';
                        badge.textContent = 'NEW!';
                        item.appendChild(badge);
                    }

                    listEl.appendChild(item);
                });

            } catch (err) {
                console.error(err);
                statusEl.className = 'error';
                statusEl.innerHTML = `Could not load games.<br>Make sure the release tag "Games" exists.`;
            }
        }

        window.onload = fetchGames;
    </script>
</body>
</html>
