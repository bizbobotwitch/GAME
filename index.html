<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV GAMES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 3.8rem;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -2px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .tab {
            padding: 14px 40px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            color: #aaa;
            transition: all 0.3s;
        }
        .tab.active {
            color: #00ff88;
            border-bottom: 4px solid #00ff88;
        }
        .section { display: none; }
        .section.active { display: block; }

        .github-link {
            display: inline-block;
            margin: 15px 0;
            padding: 12px 28px;
            background: #222;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
        .github-link:hover { background: #00ff88; color: #000; }

        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .folder-title {
            font-size: 1.4rem;
            color: #00b4ff;
            margin: 30px 0 15px 0;
        }
        .download-item, .web-game-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 18px 24px;
            margin-bottom: 14px;
            transition: all 0.3s;
        }
        .download-item:hover, .web-game-item:hover {
            background: #00ff88;
            color: #000;
            transform: translateX(8px);
        }
        .thumbnail, .no-thumb {
            width: 90px; height: 90px; border-radius: 10px; flex-shrink: 0;
        }
        .thumbnail { object-fit: cover; border: 2px solid rgba(255,255,255,0.2); }
        .no-thumb {
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
        }
        .info { flex: 1; }
        .filename, .web-title { font-size: 1.15rem; font-weight: 500; margin-bottom: 4px; font-family: monospace; }
        .size { color: #888; font-size: 0.95rem; }
        .play-btn, .download-btn {
            background: #00ff88;
            color: #000;
            padding: 12px 26px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
        }
        .new-badge {
            position: absolute; top: -8px; right: -8px;
            background: #ff00aa; color: white; font-size: 0.75rem; font-weight: 700;
            padding: 3px 11px; border-radius: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
        footer { text-align: center; margin-top: 80px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KV GAMES</h1>
            <a href="https://github.com/bizbobotwitch/GAME" target="_blank" class="github-link">
                View on GitHub
            </a>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">🌐 Web Games</div>
            <div class="tab" onclick="switchTab(1)">⬇️ Downloadable Games</div>
        </div>

        <!-- Web Games Tab -->
        <div id="web-tab" class="section active">
            <div class="card">
                <div id="web-games-list"></div>
            </div>
        </div>

        <!-- Downloadable Games Tab -->
        <div id="download-tab" class="section">
            <div class="card">
                <div id="status" class="loading" style="text-align:center; padding:40px; color:#888;">Loading games from GitHub...</div>
                <div id="download-list"></div>
            </div>
        </div>

        <footer>
            Powered by GitHub Releases • 
            <a href="https://github.com/bizbobotwitch/GAME/releases/tag/Games" target="_blank" style="color:#00ff88;">Open Release Page</a>
        </footer>
    </div>

    <script>
        // ====================== WEB GAMES ======================
        const webGames = [
            { 
                title: "Piggy Escape (Block the Pig)", 
                url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/block-the-pig/index.html", 
                description: "Logic puzzle – Block the pig from escaping!" 
            },
            { title: "Math Agar", url: "https://student-math.org/play/mathagar.html", description: "Math version of Agar.io" },
            { title: "Math Slither", url: "https://student-math.org/play/math-slither.html", description: "Snake-style math game" },
            { title: "Launch The Llama", url: "https://student-math.org/play/launch-the-llama.html", description: "Fun launching game" },
            { title: "Cat Wars", url: "https://student-math.org/play/cat-wars.html", description: "Cat battle game" },
            // Add more games here easily ↓
        ];

        function renderWebGames() {
            const container = document.getElementById('web-games-list');
            container.innerHTML = '<h2 style="margin-top:0; color:#00ff88;">🌐 Web Games (Play Instantly)</h2>';

            webGames.forEach(game => {
                const item = document.createElement('div');
                item.className = 'web-game-item';
                item.innerHTML = `
                    <div class="no-thumb">🌐</div>
                    <div class="info">
                        <div class="web-title">${game.title}</div>
                        <div class="size">${game.description}</div>
                    </div>
                    <a href="${game.url}" target="_blank" class="play-btn">Play Now</a>
                `;
                container.appendChild(item);
            });
        }

        // ====================== DOWNLOADABLE GAMES (with folder support) ======================
        const owner = "bizbobotwitch";
        const repo = "GAME";
        const tag = "Games";

        function isNew(dateStr) {
            const diffDays = (Date.now() - new Date(dateStr)) / (1000 * 60 * 60 * 24);
            return diffDays < 7;
        }

        async function fetchGames() {
            const status = document.getElementById('status');
            const list = document.getElementById('download-list');

            try {
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}`);
                if (!res.ok) throw new Error();

                const release = await res.json();
                status.style.display = 'none';

                if (!release.assets || release.assets.length === 0) {
                    list.innerHTML = `<p style="text-align:center; color:#888;">No games found yet.</p>`;
                    return;
                }

                const images = {};
                const games = [];

                release.assets.forEach(asset => {
                    const lower = asset.name.toLowerCase();
                    if (lower.endsWith('.png') || lower.endsWith('.jpg') || lower.endsWith('.jpeg')) {
                        const base = asset.name.replace(/\.(png|jpg|jpeg)$/i, '').toLowerCase();
                        images[base] = asset.browser_download_url;
                    } else {
                        games.push(asset);
                    }
                });

                const grouped = {};
                games.forEach(asset => {
                    const parts = asset.name.split('/');
                    const folder = parts.length > 1 ? parts[0] : "Other Games";
                    const fileName = parts[parts.length - 1];

                    if (!grouped[folder]) grouped[folder] = [];
                    grouped[folder].push({ ...asset, displayName: fileName });
                });

                list.innerHTML = '';

                Object.keys(grouped).sort().forEach(folder => {
                    const folderDiv = document.createElement('div');
                    folderDiv.innerHTML = `<div class="folder-title">📁 ${folder}</div>`;
                    list.appendChild(folderDiv);

                    grouped[folder].sort((a,b) => a.displayName.localeCompare(b.displayName));

                    grouped[folder].forEach(asset => {
                        const item = document.createElement('div');
                        item.className = 'download-item';
                        item.style.position = 'relative';

                        const base = asset.displayName.replace(/\.(zip|rar|7z|tar\.gz|exe)$/i, '').toLowerCase();
                        const thumb = images[base] || null;

                        const sizeMB = (asset.size / 1024 / 1024).toFixed(2);
                        const newBadge = isNew(asset.updated_at) ? `<div class="new-badge">NEW!</div>` : '';

                        let html = thumb 
                            ? `<img src="${thumb}" class="thumbnail">` 
                            : `<div class="no-thumb">🎮</div>`;

                        html += `
                            <div class="info">
                                <div class="filename">${asset.displayName}</div>
                                <div class="size">${sizeMB} MB • ${asset.download_count} downloads</div>
                            </div>
                            <a href="${asset.browser_download_url}" target="_blank" class="download-btn">Download</a>
                        `;

                        item.innerHTML = html + newBadge;
                        list.appendChild(item);
                    });
                });

            } catch (e) {
                status.innerHTML = `Failed to load. Make sure release tag "Games" exists.`;
            }
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
            document.querySelectorAll('.section').forEach((s,i) => s.classList.toggle('active', i===n));
        }

        // Load everything
        window.onload = () => {
            renderWebGames();
            fetchGames();
        };
    </script>
</body>
</html>
