<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keith Valley Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        header { 
            text-align: center; 
            margin-bottom: 40px; 
        }
        h1 {
            font-size: 3.6rem;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
        }
        .subtitle {
            font-size: 1.4rem;
            color: #aaaaaa;
            margin-top: 8px;
        }
        .github-link {
            display: inline-block;
            margin: 15px 0;
            padding: 12px 28px;
            background: #222;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
        .github-link:hover { background: #00ff88; color: #000; }

        .main-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .downloads-section {
            flex: 1;
            min-width: 300px;
        }
        .sidebar {
            width: 320px;
            min-width: 280px;
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .tab {
            padding: 14px 32px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            color: #aaa;
            transition: all 0.3s;
        }
        .tab.active {
            color: #00ff88;
            border-bottom: 4px solid #00ff88;
        }

        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .folder-title {
            font-size: 1.4rem;
            color: #00b4ff;
            margin: 25px 0 12px 0;
        }
        .download-item, .web-game-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 16px 22px;
            margin-bottom: 14px;
            transition: all 0.3s;
        }
        .download-item:hover, .web-game-item:hover {
            background: #00ff88;
            color: #000;
            transform: translateX(8px);
        }
        .thumbnail, .no-thumb {
            width: 80px; height: 80px; border-radius: 10px; flex-shrink: 0;
        }
        .no-thumb {
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .info { flex: 1; }
        .filename, .web-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 4px; font-family: monospace; }
        .size { color: #888; font-size: 0.9rem; }

        /* Sidebar */
        .sidebar-card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0,255,136,0.2);
        }
        .try-title {
            color: #00ff88;
            font-size: 1.35rem;
            margin-bottom: 15px;
        }
        .random-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .random-game .no-thumb {
            width: 140px;
            height: 140px;
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .play-btn {
            background: #00ff88;
            color: #000;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 10px;
        }

        .new-badge {
            position: absolute; top: -8px; right: -8px;
            background: #ff00aa; color: white; font-size: 0.75rem; font-weight: 700;
            padding: 3px 11px; border-radius: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

        footer { 
            text-align: center; 
            margin-top: 80px; 
            color: #666; 
            font-size: 0.95rem; 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Keith Valley Games</h1>
            <p class="subtitle">Play • Download • Enjoy</p>
            <a href="https://github.com/bizbobotwitch/GAME" target="_blank" class="github-link">
                View on GitHub
            </a>
        </header>

        <div class="main-content">
            <!-- Main Content -->
            <div class="downloads-section">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab(0)">⬇️ Downloadable Games</div>
                    <div class="tab" onclick="switchTab(1)">🌐 Web Games</div>
                </div>

                <!-- Downloadable Games -->
                <div id="download-section" class="card">
                    <div id="status" class="loading" style="text-align:center; padding:40px; color:#888;">Loading games from GitHub...</div>
                    <div id="download-list"></div>
                </div>

                <!-- Web Games -->
                <div id="web-section" class="card" style="display: none;">
                    <div id="web-games-list"></div>
                </div>
            </div>

            <!-- Sidebar: Try This Game (Random from all) -->
            <div class="sidebar">
                <div class="sidebar-card">
                    <div class="try-title">🎲 Try This Game?</div>
                    <div id="random-game" class="random-game"></div>
                </div>
            </div>
        </div>

        <footer>
            Powered by GitHub Releases • 
            <a href="https://github.com/bizbobotwitch/GAME/releases/tag/Games" target="_blank" style="color:#00ff88;">Open Release Page</a>
        </footer>
    </div>

    <script>
        // Web Games
        let allGames = [];

        const webGames = [
            { 
                title: "Piggy Escape", 
                url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/block-the-pig/index.html", 
                description: "Block the pig from escaping!",
                type: "web"
            },
            { 
                title: "Core Ball", 
                url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/core-ball/index.html", 
                description: "Fun ball bouncing challenge",
                type: "web"
            },
            { 
                title: "CircleoO", 
                url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/circlo/index.html", 
                description: "Addictive circle puzzle game",
                type: "web"
            }
        ];

        function renderWebGames() {
            const container = document.getElementById('web-games-list');
            container.innerHTML = '<h2 style="margin-top:0; color:#00ff88;">🌐 Web Games (Play Instantly)</h2>';

            webGames.forEach(game => {
                const item = document.createElement('div');
                item.className = 'web-game-item';
                item.innerHTML = `
                    <div class="no-thumb">🌐</div>
                    <div class="info">
                        <div class="web-title">${game.title}</div>
                        <div class="size">${game.description}</div>
                    </div>
                    <a href="${game.url}" target="_blank" class="play-btn">Play Now</a>
                `;
                container.appendChild(item);
            });
        }

        async function fetchGames() {
            const status = document.getElementById('status');
            const list = document.getElementById('download-list');

            try {
                const res = await fetch(`https://api.github.com/repos/bizbobotwitch/GAME/releases/tags/Games`);
                if (!res.ok) throw new Error();

                const release = await res.json();
                status.style.display = 'none';

                const downloadable = [];

                if (release.assets && release.assets.length > 0) {
                    release.assets.forEach(asset => {
                        const lower = asset.name.toLowerCase();
                        if (!lower.endsWith('.png') && !lower.endsWith('.jpg') && !lower.endsWith('.jpeg')) {
                            const displayName = asset.name.split('/').pop();
                            downloadable.push({
                                title: displayName,
                                url: asset.browser_download_url,
                                description: (asset.size / (1024*1024)).toFixed(1) + " MB",
                                type: "download"
                            });
                        }
                    });
                }

                allGames = [...webGames, ...downloadable];

                list.innerHTML = '';

                if (downloadable.length === 0) {
                    list.innerHTML = `<p style="text-align:center; color:#888;">No downloadable games found yet.</p>`;
                } else {
                    downloadable.forEach(game => {
                        const item = document.createElement('div');
                        item.className = 'download-item';
                        item.innerHTML = `
                            <div class="no-thumb">🎮</div>
                            <div class="info">
                                <div class="filename">${game.title}</div>
                                <div class="size">${game.description}</div>
                            </div>
                            <a href="${game.url}" target="_blank" 
                               style="background:#00ff88; color:#000; padding:12px 24px; border-radius:50px; text-decoration:none; font-weight:600;">
                                Download
                            </a>
                        `;
                        list.appendChild(item);
                    });
                }

            } catch (e) {
                status.innerHTML = `Failed to load games.<br>Make sure the release tag "Games" exists.`;
            }
        }

        function showRandomGame() {
            const container = document.getElementById('random-game');
            
            if (allGames.length === 0) {
                container.innerHTML = `<p style="color:#888;">Loading games...</p>`;
                return;
            }

            const randomGame = allGames[Math.floor(Math.random() * allGames.length)];

            container.innerHTML = `
                <div class="no-thumb">${randomGame.type === "web" ? "🌐" : "⬇️"}</div>
                <div style="font-size:1.3rem; font-weight:600; margin:10px 0;">${randomGame.title}</div>
                <div style="color:#aaa; margin-bottom:15px;">${randomGame.description}</div>
                <a href="${randomGame.url}" target="_blank" class="play-btn">
                    ${randomGame.type === "web" ? "Play Now" : "Download"}
                </a>
            `;
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
            
            if (n === 0) {
                document.getElementById('download-section').style.display = 'block';
                document.getElementById('web-section').style.display = 'none';
            } else {
                document.getElementById('download-section').style.display = 'none';
                document.getElementById('web-section').style.display = 'block';
            }
        }

        // Initialize
        window.onload = () => {
            fetchGames();
            renderWebGames();
            setTimeout(showRandomGame, 800);
        };
    </script>
</body>
</html>
