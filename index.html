<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keith Valley Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        header { 
            text-align: center; 
            margin-bottom: 40px; 
        }
        h1 {
            font-size: 3.6rem;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -2px;
            margin: 0;
        }
        .subtitle {
            font-size: 1.4rem;
            color: #aaaaaa;
            margin-top: 8px;
        }

        .chat-button {
            display: block;
            width: fit-content;
            margin: 20px auto;
            padding: 14px 32px;
            background: linear-gradient(90deg, #00ff88, #00b4ff);
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 50px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
        }
        .chat-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
        }

        .search-container {
            margin-bottom: 25px;
            text-align: center;
        }
        #searchInput {
            width: 60%;
            max-width: 500px;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.05rem;
        }
        #searchInput::placeholder { color: #888; }

        .main-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .downloads-section { flex: 1; min-width: 300px; }
        .sidebar { width: 320px; min-width: 280px; }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .tab {
            padding: 14px 32px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            color: #aaa;
        }
        .tab.active {
            color: #00ff88;
            border-bottom: 4px solid #00ff88;
        }

        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .download-item, .web-game-item, .mod-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 16px 22px;
            margin-bottom: 14px;
            transition: all 0.3s;
        }
        .download-item:hover, .web-game-item:hover, .mod-item:hover {
            background: #00ff88;
            color: #000;
            transform: translateX(8px);
        }

        .thumbnail {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .no-thumb {
            width: 90px;
            height: 90px;
            background: #222;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            flex-shrink: 0;
        }

        .info { flex: 1; }
        .filename, .web-title { 
            font-size: 1.12rem; 
            font-weight: 500; 
            margin-bottom: 4px; 
            font-family: monospace; 
        }
        .size { color: #888; font-size: 0.9rem; }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto 30px auto;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border: 1px dashed rgba(0,255,136,0.5);
        }
        .upload-form input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #111;
            color: white;
        }
        .upload-form label { font-size: 0.9rem; color: #00ff88; font-weight: 600; }

        .sidebar-card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0,255,136,0.2);
        }
        .try-title {
            color: #00ff88;
            font-size: 1.35rem;
            margin-bottom: 15px;
        }
        .random-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .random-game .no-thumb {
            width: 130px;
            height: 130px;
            font-size: 3.5rem;
            margin-bottom: 12px;
        }
        .play-btn {
            background: #00ff88;
            color: #000;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            display: inline-block;
        }

        .contact {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .contact a { color: #00ff88; text-decoration: none; }

        footer { text-align: center; margin-top: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Keith Valley Games</h1>
            <p class="subtitle">Play • Download • Enjoy</p>
        </header>

        <a href="https://bizbobotwitch.github.io/Chat/" target="_blank" class="chat-button">
            💬 Join Keith Valley Chat
        </a>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search games..." onkeyup="filterGames()">
        </div>

        <div class="main-content">
            <div class="downloads-section">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab(0)">⬇️ Games</div>
                    <div class="tab" onclick="switchTab(1)">🌐 Web</div>
                    <div class="tab" onclick="switchTab(2)">🛠️ TABS Mods</div>
                </div>

                <div id="download-section" class="card">
                    <div id="status" class="loading" style="text-align:center; padding:40px; color:#888;">Loading games...</div>
                    <div id="download-list"></div>
                </div>

                <div id="web-section" class="card" style="display: none;">
                    <div id="web-games-list"></div>
                </div>

                <div id="mod-section" class="card" style="display: none;">
                    <div class="upload-form">
                        <h3 style="margin-top:0; color:#00ff88;">Upload TABS Mod</h3>
                        <label>Mod Name</label>
                        <input type="text" id="modName" placeholder="e.g. Laser Eyes Mod">
                        <label>Link to Mod File (Google Drive/MediaFire)</label>
                        <input type="text" id="modLink" placeholder="https://...">
                        <label>Your Username</label>
                        <input type="text" id="modAuthor" placeholder="Creator Name">
                        <button onclick="submitMod()" class="play-btn">Submit via GitHub</button>
                    </div>
                    <div id="mods-list">
                        <p style="text-align:center; color:#888;">No mods listed yet. Use the form above to submit one!</p>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-card">
                    <div class="try-title">🎲 Try This Game?</div>
                    <div id="random-game" class="random-game"></div>
                </div>
            </div>
        </div>

        <div class="contact">
            <h2 style="margin: 0 0 15px 0; color: #00ff88;">Contact Us</h2>
            <p>Email: <a href="mailto:Bizbobotwitch1@gmail.com">Bizbobotwitch1@gmail.com</a></p>
        </div>

        <footer>Made with ❤️ for the Keith Valley community</footer>
    </div>

    <script>
        let allGames = [];
        let downloadableGames = [];

        const webGames = [
            { title: "Piggy Escape", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/block-the-pig/index.html", description: "Block the pig!", thumb: "🐷" },
            { title: "Core Ball", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/core-ball/index.html", description: "Bouncing challenge", thumb: "⚽" },
            { title: "CircleoO", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/circlo/index.html", description: "Circle puzzle", thumb: "⭕" },
            { title: "BitLife", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/bitlife/index.html", description: "Life sim", thumb: "🧬" },
            { title: "Slope", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/slope/index.html", description: "Endless runner", thumb: "🏂" },
            { title: "Death Run 3D", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/death-run-3d/index.html", description: "Survive!", thumb: "💀" },
            { title: "Drift Boss", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/drift-boss/index.html", description: "Drift king", thumb: "🏎️" },
            { title: "Rocketpult", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/rocketpult/index.html", description: "Physics rocket", thumb: "🚀" },
            { title: "Ages of Conflict", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/ages-of-conflict/index.html", description: "War sim", thumb: "⚔️" },
            { title: "2048", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/2048/index.html", description: "Numbers", thumb: "🔢" },
            { title: "Cookie Clicker", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/cookie-clicker/index.html", description: "Cookies!", thumb: "🍪" }
        ];

        function getRandomThumbnail(normalThumb) {
            return (Math.random() < 1/200) ? "https://github.com/bizbobotwitch/GAME/releases/download/Games/gabe.png" : normalThumb;
        }

        async function fetchGames() {
            const status = document.getElementById('status');
            try {
                const res = await fetch(`https://api.github.com/repos/bizbobotwitch/GAME/releases/tags/Games`);
                const release = await res.json();
                status.style.display = 'none';

                const images = {};
                release.assets.forEach(asset => {
                    const lower = asset.name.toLowerCase();
                    if (lower.match(/\.(png|jpg|jpeg)$/)) {
                        let cleanImgName = asset.name.replace(/\.[^/.]+$/, "").replace(/-KVGAMES/gi, "").toLowerCase();
                        images[cleanImgName] = asset.browser_download_url;
                    } else {
                        // REMOVE -KVGAMES FROM THE DISPLAY TITLE
                        let cleanTitle = asset.name.replace(/\.[^/.]+$/, "").replace(/-KVGAMES/gi, "");
                        
                        downloadableGames.push({
                            title: cleanTitle,
                            url: asset.browser_download_url,
                            description: (asset.size / (1024*1024)).toFixed(1) + " MB",
                            type: "download"
                        });
                    }
                });

                downloadableGames.forEach(g => { g.thumbUrl = images[g.title.toLowerCase()]; });
                allGames = [...webGames, ...downloadableGames];
                renderDownloadableGames();
                renderWebGames();
                showRandomGame();
            } catch (e) { status.innerHTML = "Error loading games."; }
        }

        function renderDownloadableGames(filtered = null) {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            (filtered || downloadableGames).forEach(game => {
                const isZadmin = game.title.toLowerCase().includes('zadmin');
                const thumb = getRandomThumbnail(game.thumbUrl);
                const item = document.createElement('div');
                item.className = 'download-item';
                item.innerHTML = `
                    ${thumb ? `<img src="${thumb}" class="thumbnail">` : `<div class="no-thumb">🎮</div>`}
                    <div class="info"><div class="filename">${game.title}</div><div class="size">${game.description}</div></div>
                    ${isZadmin ? `<button onclick="checkPass('${game.url}')" class="play-btn" style="background:#ff5555;color:white;">Pass Required</button>` : 
                    `<a href="${game.url}" target="_blank" onclick="alert('Extract before playing!')" class="play-btn">Download</a>`}
                `;
                list.appendChild(item);
            });
        }

        function renderWebGames() {
            const list = document.getElementById('web-games-list');
            list.innerHTML = '<h2 style="color:#00ff88; margin-top:0;">🌐 Instant Play</h2>';
            webGames.forEach(game => {
                const item = document.createElement('div');
                item.className = 'web-game-item';
                item.innerHTML = `<div class="no-thumb">${game.thumb}</div><div class="info"><div class="web-title">${game.title}</div><div class="size">${game.description}</div></div><a href="${game.url}" target="_blank" class="play-btn">Play</a>`;
                list.appendChild(item);
            });
        }

        function submitMod() {
            const name = document.getElementById('modName').value;
            const link = document.getElementById('modLink').value;
            const author = document.getElementById('modAuthor').value;
            if(!name || !link) return alert("Fill out Name and Link!");
            const body = encodeURIComponent(`Mod: ${name}\nAuthor: ${author}\nLink: ${link}`);
            window.open(`https://github.com/bizbobotwitch/GAME/issues/new?title=Mod Submission: ${name}&body=${body}`, '_blank');
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
            document.getElementById('download-section').style.display = (n === 0) ? 'block' : 'none';
            document.getElementById('web-section').style.display = (n === 1) ? 'block' : 'none';
            document.getElementById('mod-section').style.display = (n === 2) ? 'block' : 'none';
        }

        function filterGames() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderDownloadableGames(downloadableGames.filter(g => g.title.toLowerCase().includes(q)));
        }

        function checkPass(url) { if(prompt("Pass?") === "112111") window.open(url); else alert("Wrong"); }

        function showRandomGame() {
            const container = document.getElementById('random-game');
            if (allGames.length === 0) return;
            const game = allGames[Math.floor(Math.random() * allGames.length)];
            container.innerHTML = `<div class="no-thumb">${game.thumb || '🎮'}</div><div style="margin:10px 0; font-weight:700;">${game.title}</div><a href="${game.url}" target="_blank" class="play-btn">Try Now</a>`;
        }

        window.onload = fetchGames;
    </script>
</body>
</html>
