<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keith Valley Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap');
        
        :root {
            --primary: #00ff88;
            --secondary: #00b4ff;
            --bg-dark: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1a1a2e 0%, #0a0a0c 100%);
            color: #f0f0f0;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 40px 20px; 
        }

        header { 
            text-align: center; 
            margin-bottom: 60px; 
        }

        h1 {
            font-size: 4.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -3px;
            margin: 0;
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.3));
        }

        .search-container {
            margin: 40px 0;
            display: flex;
            justify-content: center;
        }

        #searchInput {
            width: 100%;
            max-width: 600px;
            padding: 18px 30px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(0, 180, 255, 0.2);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .tab {
            padding: 12px 25px;
            font-weight: 600;
            cursor: pointer;
            color: #777;
            border-radius: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .tab.active {
            color: white;
            background: var(--card-bg);
            box-shadow: 0 4px 0 var(--primary);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(5px);
        }

        .card-item:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .thumb-box {
            height: 180px;
            background: #111;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Updated to make images fit the box perfectly */
        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background-color: #000;
        }

        .info h3 { margin: 0; font-size: 1.4rem; color: var(--primary); }
        .info p { margin: 5px 0 0; font-size: 0.9rem; color: #aaa; }

        .btn-row {
            margin-top: auto;
            display: flex;
            gap: 10px;
        }

        .play-btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            background: var(--primary);
            color: #000;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .main-layout { display: flex; gap: 40px; }
        .content-area { flex: 1; }
        .sidebar { width: 320px; position: sticky; top: 20px; height: fit-content; }

        .sidebar-card {
            background: linear-gradient(145deg, #161625, #0a0a0c);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .upload-form input {
            padding: 12px;
            border-radius: 8px;
            background: #000;
            border: 1px solid #333;
            color: white;
        }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Keith Valley Games</h1>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for games..." onkeyup="filterGames()">
        </div>

        <div class="main-layout">
            <div class="content-area">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab(0)">Downloadable</div>
                    <div class="tab" onclick="switchTab(1)">Web Games</div>
                    <div class="tab" onclick="switchTab(2)">TABS Mods</div>
                </div>

                <div id="download-section">
                    <div id="status" style="text-align:center; padding:50px;">Connecting to Archives...</div>
                    <div id="download-list" class="game-grid"></div>
                </div>

                <div id="web-section" style="display: none;">
                    <div id="web-games-list" class="game-grid"></div>
                </div>

                <div id="mod-section" style="display: none;">
                    <div class="sidebar-card" style="width:100%; box-sizing: border-box;">
                        <h2 style="color:var(--primary)">Submit TABS Mod</h2>
                        <div class="upload-form">
                            <input type="text" id="modName" placeholder="Mod Title">
                            <input type="text" id="modAuthor" placeholder="Creator Handle">
                            <button onclick="submitMod()" class="play-btn">Submit via GitHub</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-card">
                    <h3 style="color:var(--secondary); margin-top:0;">Daily Feature</h3>
                    <div id="random-game"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allGames = [];
        let downloadableGames = [];

        const webGames = [
            { title: "Ages of Conflict", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/ages-of-conflict/index.html", description: "War simulator (Downloadable available)", thumb: "⚔️" },
            { title: "Polytrack", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/polytrack/index.html", description: "Fast-paced racing game", thumb: "🏎️" },
            { title: "Piggy Escape", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/block-the-pig/index.html", description: "Block the pig!", thumb: "🐷" },
            { title: "Core Ball", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/core-ball/index.html", description: "Timing challenge", thumb: "⚽" },
            { title: "CircleoO", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/circlo/index.html", description: "Addictive puzzle", thumb: "⭕" },
            { title: "Slope", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/slope/index.html", description: "Endless neon runner", thumb: "🏂" },
            { title: "Cookie Clicker", url: "https://bizbobotwitch.github.io/druskii128.github.io/projects/cookie-clicker/index.html", description: "Idle classic", thumb: "🍪" }
        ];

        async function fetchGames() {
            const status = document.getElementById('status');
            try {
                const res = await fetch(`https://api.github.com/repos/bizbobotwitch/GAME/releases/tags/Games`);
                if (!res.ok) throw new Error();
                const release = await res.json();
                status.style.display = 'none';

                const images = {};
                release.assets.forEach(asset => {
                    if (asset.name.match(/\.(png|jpg|jpeg|webp)$/i)) {
                        const key = asset.name.replace(/\.[^/.]+$/, "").replace(/-KVGAMES/gi, "").toLowerCase().trim();
                        images[key] = asset.browser_download_url;
                    }
                });

                downloadableGames = release.assets.filter(a => !a.name.match(/\.(png|jpg|jpeg|webp)$/i)).map(asset => {
                    const cleanTitle = asset.name.replace(/\.[^/.]+$/, "").replace(/-KVGAMES/gi, "").trim();
                    return {
                        title: cleanTitle,
                        url: asset.browser_download_url,
                        description: (asset.size / (1024*1024)).toFixed(1) + " MB • Extract Required",
                        thumbUrl: images[cleanTitle.toLowerCase()]
                    };
                });

                allGames = [...webGames, ...downloadableGames];
                renderDownloadableGames();
                renderWebGames();
                showRandomGame();
            } catch (e) { status.innerHTML = "Sync Error: Check GitHub Release."; }
        }

        function renderDownloadableGames(filtered = null) {
            const list = document.getElementById('download-list');
            list.innerHTML = '';
            (filtered || downloadableGames).forEach(game => {
                const card = document.createElement('div');
                card.className = 'card-item';
                card.innerHTML = `
                    <div class="thumb-box">
                        ${game.thumbUrl ? `<img src="${game.thumbUrl}" class="thumb-img">` : `🎮`}
                    </div>
                    <div class="info">
                        <h3>${game.title}</h3>
                        <p>${game.description}</p>
                    </div>
                    <div class="btn-row">
                        <a href="${game.url}" class="play-btn">DOWNLOAD</a>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function renderWebGames() {
            const list = document.getElementById('web-games-list');
            webGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card-item';
                card.innerHTML = `
                    <div class="thumb-box">${game.thumb}</div>
                    <div class="info">
                        <h3>${game.title}</h3>
                        <p>${game.description}</p>
                    </div>
                    <div class="btn-row">
                        <a href="${game.url}" target="_blank" class="play-btn" style="background:var(--secondary)">PLAY NOW</a>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
            document.getElementById('download-section').style.display = (n === 0) ? 'block' : 'none';
            document.getElementById('web-section').style.display = (n === 1) ? 'block' : 'none';
            document.getElementById('mod-section').style.display = (n === 2) ? 'block' : 'none';
        }

        function filterGames() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderDownloadableGames(downloadableGames.filter(g => g.title.toLowerCase().includes(q)));
        }

        function showRandomGame() {
            const target = document.getElementById('random-game');
            if(allGames.length === 0) return;
            const game = allGames[Math.floor(Math.random() * allGames.length)];
            target.innerHTML = `
                <div style="font-size:3rem; margin:15px 0;">${game.thumb || '🕹️'}</div>
                <h4 style="margin:10px 0; color:var(--primary)">${game.title}</h4>
                <a href="${game.url}" target="_blank" class="play-btn" style="display:block">TRY THIS</a>
            `;
        }

        function submitMod() {
            const name = document.getElementById('modName').value;
            window.open(`https://github.com/bizbobotwitch/GAME/issues/new?title=Mod Submission: ${name}`, '_blank');
        }

        window.onload = fetchGames;
    </script>
</body>
</html>
